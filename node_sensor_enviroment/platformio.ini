; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_build.partitions = partitions.csv
; PlatformIO's builder mis-derives the app upload offset (0x210000) from
; partitions.csv, while the flashed partition table boots the factory app
; at 0x20000 (see .pio/.../flasher_args.json). board_upload.offset_address
; alone is NOT enough: builder/main.py:_parse_partitions() overwrites it
; during checkprogsize. The pre-upload hook below restores the correct
; offset right before esptool runs.
board_upload.offset_address = 0x20000
extra_scripts = post:fix_app_upload_offset.py
lib_deps =
    miguel5612/MQUnifiedsensor @ ^3.0.5
